<script>
document.addEventListener("DOMContentLoaded", function () {
    document.body.addEventListener("change", function (e) {
        if (e.target && e.target.getAttribute('data-col') === 'mfa') {
            const el = e.target;
            const id = el.getAttribute('data-id');
            const val = el.checked ? "1" : "0";

            if (!confirm("确定修改？")) {
                el.checked = !el.checked;
                return;
            }

            fetch("/update_mfa.php", { // 👈 指向你新建的 PHP 文件
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: id, mfa: val })
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 0) {
                    alert("✅ 保存成功");
                    //location.reload();
                } else {
                    alert("❌ 保存失败：" + data.msg);
                    el.checked = !el.checked;
                }
            })
            .catch(err => {
                console.error(err);
                alert("🚨 网络错误，请检查控制台");
                el.checked = !el.checked;
            });
        }
    });
});
</script>
